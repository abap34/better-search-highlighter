<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Better Search Highlighter Manual Test</title>
    <style>
      body {
        margin: 0;
        font: 16px/1.6 system-ui, sans-serif;
      }

      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 32px 20px 120px;
      }

      section {
        padding: 24px 0;
        border-top: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Better Search Highlighter Manual Test</h1>
      <p>
        Search for <strong>needle</strong>. This page appends more matching text as you scroll.
      </p>
      <div id="content"></div>
    </main>
    <script>
      const content = document.querySelector("#content");
      let batch = 0;

      function appendBatch() {
        const fragment = document.createDocumentFragment();
        for (let index = 0; index < 40; index += 1) {
          const section = document.createElement("section");
          section.textContent = `Batch ${batch}, row ${index}: haystack haystack needle haystack.`;
          fragment.append(section);
        }
        batch += 1;
        content.append(fragment);
      }

      appendBatch();
      appendBatch();

      window.addEventListener("scroll", () => {
        if (window.innerHeight + window.scrollY > document.body.offsetHeight - 800) {
          appendBatch();
        }
      }, { passive: true });
    </script>
  </body>
</html>
